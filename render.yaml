services:
  # Backend Service (Python/Flask)
  - type: web
    name: learn2master-backend
    runtime: python
    buildCommand: pip install -r server/requirements.txt
    startCommand: cd server && gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: learn2master-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: AI_PROVIDER
        value: openai
      - key: AI_API_KEY
        sync: false

databases:
  - name: learn2master-db
    plan: free
    databaseName: learn2master
    user: learn2master
