<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - Learn2Master</title>
    <meta name="description" content="You're offline. Some features may be unavailable until you reconnect." />
    <meta name="theme-color" content="#1b7a67" />
    <style>
      html, body { height: 100%; }
      body { margin: 0; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: #f1f5f9; color: #0f172a; display:flex; align-items:center; justify-content:center; }
      .card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 10px 15px -3px rgba(2,6,23,.1), 0 4px 6px -4px rgba(2,6,23,.1); max-width: 420px; text-align: center; }
      .title { font-weight: 700; font-size: 20px; margin: 0 0 8px; }
      .desc { color: #334155; margin-bottom: 16px; }
      .btn { display: inline-block; padding: 10px 14px; border-radius: 8px; background: #1b7a67; color: #fff; text-decoration: none; font-weight: 600; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="title">You're offline</div>
      <div class="desc">Some features may be unavailable. We'll sync your progress when you're back online.</div>
      <a class="btn" href="/">Go to Home</a>
    </div>
  </body>
</html>
